<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Engine Pro | Motion Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
</head>
<body class="engine-theme">

    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-wrapper">
            <div class="scanner-line"></div>
            <h2 class="loading-text">INITIALIZING ENGINE</h2>
            <div class="progress-container">
                <div class="progress-glow"></div>
            </div>
        </div>
    </div>

    <header class="main-header glass">
        <div class="logo">
            <span class="brand-core">3D</span><span class="brand-view">STUDIO</span>
        </div>
        <div class="system-status">
            <div class="status-item">
                <span class="label">GPU:</span> <span class="value">ACCELERATED</span>
            </div>
            <div class="status-item d-none d-md-block">
                <span class="label">ENGINE:</span> <span class="value text-primary">v3.0.4</span>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="control-panel glass shadow-lg">
            <div class="panel-section">
                <h6 class="section-title">ANIMATION_LIBRARY</h6>
                <div class="action-grid" id="animation-menu">
                    <button class="action-card" data-key="1" id="btn-stab">
                        <div class="card-icon"><i class="bi bi-lightning-charge"></i></div>
                        <div class="card-label">STAB_ATK</div>
                        <div class="card-shortcut">1</div>
                    </button>
                    <button class="action-card" data-key="2" id="btn-jump">
                        <div class="card-icon"><i class="bi bi-arrow-up-circle"></i></div>
                        <div class="card-label">LEAP_JUMP</div>
                        <div class="card-shortcut">2</div>
                    </button>
                    <button class="action-card" data-key="3" id="btn-walk">
                        <div class="card-icon"><i class="bi bi-person-walking"></i></div>
                        <div class="card-label">WALK_FWD</div>
                        <div class="card-shortcut">3</div>
                    </button>
                    <button class="action-card" data-key="4" id="btn-bite">
                        <div class="card-icon"><i class="bi bi-virus"></i></div>
                        <div class="card-label">INFECT_BITE</div>
                        <div class="card-shortcut">4</div>
                    </button>
                    <button class="action-card" data-key="5" id="btn-crawl">
                        <div class="card-icon"><i class="bi bi-reception-1"></i></div>
                        <div class="card-label">CRAWL_DRAG</div>
                        <div class="card-shortcut">5</div>
                    </button>
                </div>
            </div>
             <div class="panel-section mt-auto">

                <p class="mb-1"><i class="bi bi-info-circle me-2"></i><strong>Tips</strong></p>

                <p class="mb-1">Click + Arrastrar: Rotar</p>

                <p class="mb-1">Scroll: Zoom</p>

                <p class="mb-0">Usa números 1-5 teclado.</p>

            </div>
            
        </aside>

        <main class="viewer-core">
            <div id="canvas-container"></div>
            
            <div class="viewport-hud hud-top-right glass">
                <div class="hud-data">
                    <span class="hud-label">ACTIVE_MOTION:</span>
                    <span id="current-label" class="hud-value text-primary">IDLE_SYSTEM</span>
                </div>
            </div>
            
            <div class="viewport-hud hud-bottom-left glass">
                <div class="hud-data">
                    <span class="hud-label text-success">STATUS: OK</span>
                    <span class="hud-label ms-3">SAMPLES: 16x</span>
                </div>
            </div>
        </main>
    </div>

    <footer class="engine-footer border-top border-secondary">
        <div class="footer-content px-4 py-2">
            <span class="footer-meta">RENDERER: WEBGL_2_PRO</span>
            <span class="footer-meta text-primary">&copy; 2026 MICHELL OSTRIA</span>
            <span class="footer-meta d-none d-md-block">| ING_SISTEMAS_COMPUTACIONALES</span>
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
